name: macOS VNC + Ngrok

on:
  workflow_dispatch:
    inputs:
      ngrok_authtoken:
        description: 'Ngrok auth token (from ngrok.com/dashboard)'
        required: true
      timeout:
        description: 'Session timeout (e.g. 1h, 2h, 6h)'
        required: true
        default: '2h'

jobs:
  vnc:
    runs-on: macos-13
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate VNC password
        run: |
          PASSWORD=$(openssl rand -base64 8 | tr -d '/+=' | cut -c1-8)
          echo "VNC_PASSWORD=$PASSWORD" >> $GITHUB_ENV
          echo "VNC Password: $PASSWORD"

      - name: Enable Screen Sharing (VNC)
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -restart -agent -privs -all
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvncpw -vncpw "$VNC_PASSWORD"
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -restart -agent -console
          echo "Screen Sharing enabled on port 5900"

      - name: Install ngrok (macOS)
        run: |
          # Download macOS version (not Linux)
          curl -sSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-amd64.zip -o ngrok.zip
          unzip -qq ngrok.zip
          chmod +x ngrok
          ./ngrok version

      - name: Start ngrok tunnel + print connection info
        env:
          NGROK_AUTHTOKEN: ${{ github.event.inputs.ngrok_authtoken }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: |
          # Auth ngrok
          ./ngrok config add-authtoken "$NGROK_AUTHTOKEN"

          # Start tunnel to VNC port 5900 in background
          ./ngrok tcp 5900 --log=stdout > ngrok.log 2>&1 &
          NGROK_PID=$!

          # Wait for tunnel to come up
          echo "Starting ngrok tunnel..."
          sleep 8

          # Fetch the public URL from ngrok's local API
          NGROK_URL=$(curl -s http://localhost:4040/api/tunnels \
            | python3 -c "import sys,json; t=json.load(sys.stdin)['tunnels']; print(t[0]['public_url'] if t else '')" \
            2>/dev/null)

          if [ -z "$NGROK_URL" ]; then
            echo "Failed to get ngrok URL. Check your auth token."
            cat ngrok.log
            exit 1
          fi

          # Extract host and port from tcp://X.tcp.ngrok.io:XXXXX
          VNC_HOST=$(echo $NGROK_URL | sed 's|tcp://||' | cut -d: -f1)
          VNC_PORT=$(echo $NGROK_URL | sed 's|tcp://||' | cut -d: -f2)

          echo ""
          echo "========================================="
          echo " VNC CONNECTION DETAILS"
          echo "========================================="
          echo " Host     : $VNC_HOST"
          echo " Port     : $VNC_PORT"
          echo " Password : $VNC_PASSWORD"
          echo ""
          echo " Connect string: $VNC_HOST:$VNC_PORT"
          echo "========================================="
          echo ""
          echo " On Mac: open vnc://$VNC_HOST:$VNC_PORT"
          echo " On Windows: use RealVNC Viewer or TightVNC"
          echo " On iPhone: use 'VNC Viewer' app by RealVNC"
          echo ""

          # Keep alive for the timeout duration
          echo "Session will stay alive for $TIMEOUT"
          sleep $(echo $TIMEOUT | sed 's/h/*3600/' | sed 's/m/*60/' | bc)
