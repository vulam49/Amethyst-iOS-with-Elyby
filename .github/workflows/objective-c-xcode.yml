name: Build IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake ldid wget

      - name: Set up JDK 8 (Zulu)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'zulu'
          architecture: x64

      - name: Verify Java 8
        run: |
          java -version
          javac -version
          # Must print "1.8.0" — if not, the Makefile will reject it
          javac -version 2>&1 | grep "1.8.0" || { echo "WRONG JAVA VERSION"; exit 1; }
          echo "BOOTJDK=$JAVA_HOME/bin" >> $GITHUB_ENV

      - name: Build
        run: |
          make \
            TROLLSTORE_JIT_ENT=1 \
            RELEASE=1 \
            SLIMMED=1 \
            BOOTJDK=$BOOTJDK \
            SDKPATH=$(xcrun --sdk iphoneos --show-sdk-path)

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-IPA
          path: artifacts/*.tipa
          retention-days: 7
